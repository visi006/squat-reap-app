<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Fitness Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🏋️ AI Fitness Trainer</h1>

    <div class="container">
        <!-- Video Section -->
        <div class="video-box">
            <video id="video" autoplay muted></video>
        </div>

        <!-- Stats Section -->
        <div class="stats-box">
            <div class="card">
                <h3>State</h3>
                <p id="state">--</p>
            </div>

            <div class="card">
                <h3>Reps</h3>
                <p id="reps">0</p>
            </div>

            <div class="card">
                <h3>Accuracy</h3>
                <p id="accuracy">0%</p>
            </div>

            <div class="card feedback">
                <h3>Feedback</h3>
                <p id="feedback">Waiting...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
